<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login WAREG</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">WAREG • Login</div>
      <h1 class="auth-title">Masuk ke WAREG</h1>
      <p class="auth-copy">Gunakan email terdaftar untuk mulai mengelola data komoditas, prediksi harga, dan dapur digital.</p>

      <form id="login-form">
        <input id="login-email" type="email" class="auth-input" placeholder="Email" required />
        <input id="login-password" type="password" class="auth-input" placeholder="Password" required />
        <button type="submit" class="auth-btn">Masuk</button>
      </form>

      <div class="error-msg" id="login-error"></div>
      <div class="auth-footer">Belum punya akun? <a href="/register" class="auth-link">Daftar sekarang</a></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('wareg_token');
      if (token) {
        fetch('/api/commodity', {
          headers: { 'Authorization': `Bearer ${token}` },
        })
          .then(response => {
            if (response.ok) {
              window.location.href = '/';
            } else {
              localStorage.removeItem('wareg_token');
            }
          })
          .catch(() => {
            localStorage.removeItem('wareg_token');
          });
      }

      const form = document.getElementById('login-form');
      const errorBox = document.getElementById('login-error');

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        errorBox.textContent = '';

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        })
          .then(async response => {
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || 'Login gagal. Coba lagi.');
            }
            return data;
          })
          .then(data => {
            localStorage.setItem('wareg_token', data.token);
            window.location.href = '/';
          })
          .catch(err => {
            errorBox.textContent = err.message;
          });
      });
    });
  </script>
</body>
</html>
